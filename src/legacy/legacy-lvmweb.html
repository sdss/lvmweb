<style>
body {font-family: Arial;}

/* Style the tab */
.tab {
  overflow: hidden;
  border: 1px solid #ccc;
  background-color: #f1f1f1;
}

/* Style the buttons inside the tab */
.tab button {
  background-color: inherit;
  float: left;
  border: none;
  outline: none;
  cursor: pointer;
  padding: 14px 16px;
  transition: 0.3s;
  font-size: 17px;
}

/* Change background color of buttons on hover */
.tab button:hover {
  background-color: #ddd;
}

/* Create an active/current tablink class */
.tab button.active {
  background-color: #ccc;
}

/* Style the tab content */
.tabcontent {
  display: none;
  padding: 6px 12px;
  border: 1px solid #ccc;
  border-top: none;
  height: calc(100vh - 100px);
}

.container_p {
  position: relative;
  width: 100%;
  overflow: hidden;
  height: 100%;
  /* padding-top: 100%; */
}

.container_l {
  position: relative;
  width: 100%;
  overflow: hidden;
  padding-top: 85%;
}

.responsive-iframe {
  position: absolute;
  top: 0;
  left: 0;
  bottom: 0;
  right: 0;
  width: 100%;
  height: 100%;
  border: none;
}

</style>

<script>
function openCity(evt, cityName) {
  console.log(cityName)
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }

  tablinks = document.getElementsByClassName("tablinks");
  for (i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  document.getElementById("Container").style.display = "block";
  evt.currentTarget.className += " active";

  const container = document.getElementById('Container');
  const frame = container.childNodes[1].childNodes[1];
  switch (cityName) {
    case "RabbitMQ":
      frame.src = "/rabbitmq/#/queues";
      break;
    case "PwiSci":
      frame.src = "/pwisci/default";
      break;
    case "PwiSpec":
      frame.src = "/pwispec/default";
      break;
    case "PwiSkye":
      frame.src = "/pwiskye/default";
      break;
    case "PwiSkyw":
      frame.src = "/pwiskyw/default";
      break;
    case "MoTan":
      frame.src = "/motan/default";
      break;
    case "Weather":
      frame.src = "http://weather.lco.cl";
      break;
    default:
      frame.src = "/pwisci/default"
      break;
  }

}

openCity(event, 'PwiSci')
